<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="grid.css" />
    <title>E-Commerce Grid Layout</title>
  </head>
  <body>
    <div class="container">
      <header class="full-width">HEADER (full width)</header>

      <section class="hero full-width">HERO BANNER</section>

      <aside class="sidebar">
        <h3>Filter</h3>
        <label><input type="checkbox" /> Option 1</label><br />
        <label><input type="checkbox" /> Option 2</label><br />
        <label><input type="checkbox" /> Option 3</label>
      </aside>

      <main class="main-content">
        <div class="product-grid">
          <div class="card">Card 1</div>
          <div class="card">Card 2</div>
          <div class="card">Card 3</div>
          <div class="card">Card 4</div>
          <div class="card">Card 5</div>
          <div class="card">Card 6</div>
        </div>
      </main>

      <aside class="ads">
        <img src="https://via.placeholder.com/200x400" alt="Ads" />
      </aside>

      <footer class="full-width">FOOTER (full width)</footer>
    </div>
  </body>
</html>
