<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="responsive.css" />
  </head>
  <body>
    <header>
      <div class="logo">LOGO</div>
      <div class="hamburger">&#9776;</div>
      <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Liên hệ</a>
      </nav>
    </header>

    <main>
      <aside class="sidebar">
        <select>
          <option>Filter 1</option>
          <option>Filter 2</option>
        </select>
      </aside>

      <section class="product-grid">
        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product 1" />
          <h4>Product 1</h4>
        </div>
        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product 2" />
          <h4>Product 2</h4>
        </div>
        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product 3" />
          <h4>Product 3</h4>
        </div>
        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product 4" />
          <h4>Product 4</h4>
        </div>
        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product 5" />
          <h4>Product 5</h4>
        </div>
        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product 6" />
          <h4>Product 6</h4>
        </div>
        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product 7" />
          <h4>Product 7</h4>
        </div>
        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product 8" />
          <h4>Product 8</h4>
        </div>
      </section>

      <aside class="ads-bar">
        <p>ADS BAR</p>
      </aside>
    </main>

    <footer>
      <p>FOOTER</p>
    </footer>
  </body>
</html>
